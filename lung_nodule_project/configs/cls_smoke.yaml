seed: 42
device: cuda
data:
  lidc_meta_npy: /mnt/e/dataset/LIDC-IDRI_1176/LIDC-IDRI_1176.npy
  lidc_zip: /mnt/e/dataset/LIDC-IDRI_1176/LIDC-IDRI_1176.zip
  extracted_root: /home/qianbimo/dataset_cache/lidc_cache_smoke/_extracted
  processed_root: /home/qianbimo/dataset_cache/lidc_cache_smoke
  benign_dir: /home/qianbimo/dataset_cache/lidc_cache_smoke/benign
  malignant_dir: /home/qianbimo/dataset_cache/lidc_cache_smoke/malignant
  train_list: /home/qianbimo/dataset_cache/lidc_cache_smoke/train.txt
  val_list: /home/qianbimo/dataset_cache/lidc_cache_smoke/val.txt
  test_list: /home/qianbimo/dataset_cache/lidc_cache_smoke/test.txt
preprocess:
  roi_size_zyx:
  - 64
  - 64
  - 64
  crop_mode: center
  hu_clip:
  - -1200
  - 600
  split_ratio:
  - 0.8
  - 0.2
  - 0.0
  overwrite: true
  extract_zip_if_needed: true
  max_cases: 120
train:
  epochs: 1
  batch_size: 2
  num_workers: 0
  learning_rate: 0.0001
  weight_decay: 0.0001
  optimizer: adam
  scheduler: cosine
  amp: true
  grad_clip: 3.0
  save_dir: ./workspace/weights
  log_dir: ./workspace/outputs/logs
  fig_dir: ./workspace/outputs/figures
  model_type: mamba
  loss_type: ce
  use_class_weight: true
model:
  in_channels: 1
  num_classes: 2
  backbone_depth: 18
  feat_dim: 256
  mamba_dim: 256
  mamba_layers: 2
  dropout: 0.2
